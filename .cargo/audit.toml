[advisories]
# Transitive via mq-lang (upstream https://github.com/harehare/mq), not code
# paths minder's usage (features = ["std", "sync", "file-io"]) exercises.
# Revisit when mq-lang bumps bincode/quick-xml upstream. Kept in sync with
# the advisories.ignore list in deny.toml.
ignore = [
  "RUSTSEC-2025-0141", # bincode unmaintained
  "RUSTSEC-2026-0194", # quick-xml quadratic runtime on duplicate attrs
  "RUSTSEC-2026-0195", # quick-xml unbounded namespace-declaration allocation
]
